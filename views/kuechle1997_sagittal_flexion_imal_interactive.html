<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kuechle 1997 Sagittal Flexion IMAL</title>
    <style>
      :root {
        --bg: #0b0f17;
        --panel: rgba(17, 24, 39, 0.55);
        --panel2: rgba(15, 23, 42, 0.65);
        --text: #e5e7eb;
        --muted: #9ca3af;
        --border: rgba(255, 255, 255, 0.08);
        --btn: rgba(255, 255, 255, 0.08);
        --btnHover: rgba(255, 255, 255, 0.12);
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial;
        background: radial-gradient(1200px 900px at 20% 10%, rgba(96,165,250,0.15), transparent 45%),
                    radial-gradient(900px 700px at 80% 15%, rgba(34,197,94,0.12), transparent 45%),
                    var(--bg);
        color: var(--text);
        overflow: hidden;
      }
      .wrap { height: 100%; display: grid; grid-template-rows: auto 1fr; }
      .top {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
        backdrop-filter: blur(12px);
        align-items: center;
      }
      .title { font-weight: 750; font-size: 13px; }
      .subtitle { color: var(--muted); font-size: 12px; margin-top: 2px; line-height: 1.25; }
      .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
      .btn {
        border: 1px solid var(--border);
        background: var(--btn);
        color: var(--text);
        padding: 7px 10px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 650;
        font-size: 12px;
      }
      .btn:hover { background: var(--btnHover); }
      .status { color: var(--muted); font-size: 12px; white-space: nowrap; }
      .main { position: relative; display: grid; grid-template-columns: 320px 1fr; min-height: 0; }
      .left {
        border-right: 1px solid var(--border);
        background: var(--panel2);
        backdrop-filter: blur(12px);
        padding: 10px 10px 12px;
        overflow: auto;
      }
      .sectionTitle { font-weight: 750; font-size: 12px; margin: 4px 4px 10px; color: var(--muted); letter-spacing: 0.2px; }
      .check {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 8px;
        border: 1px solid var(--border);
        border-radius: 14px;
        margin: 8px 4px;
        background: rgba(0,0,0,0.14);
      }
      .swatch { width: 12px; height: 12px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.25); }
      .check label { font-size: 12px; font-weight: 650; }
      .hint { margin: 8px 4px 0; font-size: 12px; color: var(--muted); line-height: 1.35; }
      .stage { position: relative; overflow: hidden; min-width: 0; }
      canvas { width: 100%; height: 100%; display: block; }
      .overlay {
        position: absolute;
        right: 12px;
        bottom: 12px;
        background: rgba(0,0,0,0.35);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 8px 10px;
        color: var(--muted);
        font-size: 12px;
        backdrop-filter: blur(8px);
      }
      .tooltip {
        position: absolute;
        pointer-events: none;
        background: rgba(0,0,0,0.78);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 8px 10px;
        color: var(--text);
        font-size: 12px;
        max-width: 340px;
        display: none;
        z-index: 10;
        backdrop-filter: blur(8px);
      }
      .tooltip .muted { color: var(--muted); font-weight: 650; }
      @media (max-width: 860px) {
        .top { grid-template-columns: 1fr; }
        .main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
        .left { border-right: none; border-bottom: 1px solid var(--border); max-height: 240px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div>
          <div class="title">Kuechle et al. (1997) - Sagittal-plane flexion IMAL</div>
          <div class="subtitle">Black curves (Fig. 6), approximate manual digitization. Flexion-only: segments with y â‰¤ 0 are hidden.</div>
        </div>
        <div class="controls">
          <button id="fit" class="btn">Fit</button>
          <button id="reset" class="btn">Reset</button>
          <button id="all" class="btn">Show all</button>
          <button id="none" class="btn">Hide all</button>
          <div id="status" class="status"></div>
        </div>
      </div>

      <div class="main">
        <div class="left">
          <div class="sectionTitle">Toggle lines</div>
          <div id="checks"></div>
          <div class="hint">Hover a curve to see the region name and value.</div>
        </div>
        <div class="stage" id="stage">
          <canvas id="c"></canvas>
          <div class="overlay">Wheel = zoom | Drag = pan</div>
          <div id="tip" class="tooltip"></div>
        </div>
      </div>
    </div>

    <script>
      // Coarse, manual digitization from Fig. 6 (flexion). Units: cm.
      const series = [
        { name: "Teres major", color: "#60a5fa", pts: [[0,3.8],[10,4.2],[20,4.5],[30,4.7],[40,4.8],[50,4.8],[60,4.7],[70,4.5],[80,4.2]] },
        { name: "Latissimus dorsi", color: "#0ea5e9", pts: [[0,2.7],[10,3.1],[20,3.5],[30,3.8],[40,4.0],[50,4.0],[60,3.9],[70,3.7],[80,3.3]] },
        { name: "Pectoralis major", color: "#ef4444", pts: [[0,0.5],[10,0.4],[20,0.3],[30,0.3],[40,0.4],[50,0.5],[60,0.6],[70,0.6],[80,0.6]] },
        { name: "Subscapularis", color: "#93c5fd", pts: [[0,0.2],[10,0.3],[20,0.5],[30,0.7],[40,0.9],[50,1.0],[60,0.9],[70,0.7],[80,0.5]] },
        { name: "Supraspinatus", color: "#e11d48", pts: [[0,0.0],[10,0.1],[20,0.2],[30,0.3],[40,0.4],[50,0.4],[60,0.3],[70,0.2],[80,0.1]] },
        { name: "Infraspinatus", color: "#a78bfa", pts: [[0,0.1],[10,0.2],[20,0.3],[30,0.5],[40,0.7],[50,0.8],[60,0.7],[70,0.5],[80,0.3]] },
        { name: "Teres minor", color: "#facc15", pts: [[0,0.0],[10,0.0],[20,0.1],[30,0.2],[40,0.2],[50,0.2],[60,0.1],[70,0.0],[80,0.0]] },
        { name: "Posterior deltoid", color: "#94a3b8", pts: [[0,-1.3],[10,-1.5],[20,-1.7],[30,-1.9],[40,-2.1],[50,-2.2],[60,-2.2],[70,-2.1],[80,-1.9]] },
        { name: "Middle deltoid", color: "#22c55e", pts: [[0,-0.4],[10,-0.6],[20,-0.8],[30,-1.0],[40,-1.2],[50,-1.3],[60,-1.4],[70,-1.5],[80,-1.6]] },
        { name: "Anterior deltoid", color: "#f97316", pts: [[0,-0.8],[10,-1.0],[20,-1.3],[30,-1.6],[40,-1.9],[50,-2.1],[60,-2.2],[70,-2.2],[80,-2.0]] },
      ].map(s => ({ ...s, visible: true }));

      function filterPositive(pts) { return pts.map(([x,y]) => ({ x, y: (y > 0 ? y : null) })); }
      for (const s of series) s.data = filterPositive(s.pts);

      const checksEl = document.getElementById("checks");
      for (const s of series) {
        const row = document.createElement("div");
        row.className = "check";
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = true;
        cb.addEventListener("change", () => { s.visible = cb.checked; draw(); });
        const sw = document.createElement("div");
        sw.className = "swatch";
        sw.style.background = s.color;
        const lab = document.createElement("label");
        lab.textContent = s.name;
        row.append(cb, sw, lab);
        checksEl.appendChild(row);
      }

      const canvas = document.getElementById("c");
      const stage = document.getElementById("stage");
      const status = document.getElementById("status");
      const ctx = canvas.getContext("2d");
      const tip = document.getElementById("tip");

      let view = { xMin: 0, xMax: 80, yMin: 0, yMax: 5 };
      function fit() {
        const vis = series.filter(s => s.visible);
        const ys = [];
        for (const s of vis) for (const p of s.data) if (p.y !== null) ys.push(p.y);
        const yMax = ys.length ? Math.max(...ys) : 1;
        view = { xMin: 0, xMax: 80, yMin: 0, yMax: yMax + 0.3 };
        draw();
      }
      function reset() { view = { xMin: 0, xMax: 80, yMin: 0, yMax: 5 }; draw(); }
      document.getElementById("fit").addEventListener("click", fit);
      document.getElementById("reset").addEventListener("click", reset);
      document.getElementById("all").addEventListener("click", () => {
        for (const s of series) s.visible = true;
        [...checksEl.querySelectorAll("input[type=checkbox]")].forEach(cb => cb.checked = true);
        draw();
      });
      document.getElementById("none").addEventListener("click", () => {
        for (const s of series) s.visible = false;
        [...checksEl.querySelectorAll("input[type=checkbox]")].forEach(cb => cb.checked = false);
        draw();
      });

      function resize() {
        const r = stage.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.max(1, Math.floor(r.width * dpr));
        canvas.height = Math.max(1, Math.floor(r.height * dpr));
        canvas.style.width = `${r.width}px`;
        canvas.style.height = `${r.height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        draw();
      }
      window.addEventListener("resize", resize);

      function xToPx(x, w, padL) { return padL + (x - view.xMin) * (w / (view.xMax - view.xMin)); }
      function yToPx(y, h, padT) { return padT + (view.yMax - y) * (h / (view.yMax - view.yMin)); }
      function pxToX(px, w, padL) { return view.xMin + (px - padL) * (view.xMax - view.xMin) / w; }
      function pxToY(py, h, padT) { return view.yMax - (py - padT) * (view.yMax - view.yMin) / h; }

      function hideTip() { tip.style.display = "none"; }
      function showTip(html, x, y) {
        tip.innerHTML = html;
        tip.style.display = "block";
        const pad = 14;
        const rect = stage.getBoundingClientRect();
        const tipRect = tip.getBoundingClientRect();
        const left = Math.min(rect.width - tipRect.width - pad, x + pad);
        const top = Math.min(rect.height - tipRect.height - pad, y + pad);
        tip.style.left = `${Math.max(pad, left)}px`;
        tip.style.top = `${Math.max(pad, top)}px`;
      }
      function distToSegment(px, py, ax, ay, bx, by) {
        const abx = bx - ax, aby = by - ay;
        const apx = px - ax, apy = py - ay;
        const abLen2 = abx * abx + aby * aby;
        let t = abLen2 ? (apx * abx + apy * aby) / abLen2 : 0;
        t = Math.max(0, Math.min(1, t));
        const cx = ax + t * abx;
        const cy = ay + t * aby;
        return { dist: Math.hypot(px - cx, py - cy), cx, cy };
      }
      function closestOnPolyline(px, py, pts) {
        if (!pts || pts.length < 2) return null;
        let best = null;
        for (let i = 0; i < pts.length - 1; i++) {
          const a = pts[i], b = pts[i + 1];
          const hit = distToSegment(px, py, a.px, a.py, b.px, b.py);
          if (!best || hit.dist < best.dist) best = hit;
        }
        return best;
      }
      function strokeSpline(points, color, width) {
        if (points.length < 2) return;
        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(points[0].px, points[0].py);
        for (let i = 1; i < points.length - 1; i++) {
          const cx = points[i].px, cy = points[i].py;
          const nx = (points[i].px + points[i + 1].px) / 2;
          const ny = (points[i].py + points[i + 1].py) / 2;
          ctx.quadraticCurveTo(cx, cy, nx, ny);
        }
        ctx.lineTo(points[points.length - 1].px, points[points.length - 1].py);
        ctx.stroke();
        ctx.restore();
      }

      let screenSeries = [];
      function drawAxes(padL, padT, w, h) {
        ctx.save();
        ctx.lineWidth = 1;
        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        for (let x = Math.ceil(view.xMin / 10) * 10; x <= view.xMax; x += 10) {
          const px = xToPx(x, w, padL);
          ctx.beginPath(); ctx.moveTo(px, padT); ctx.lineTo(px, padT + h); ctx.stroke();
        }
        for (let y = 0; y <= view.yMax; y += 1) {
          const py = yToPx(y, h, padT);
          ctx.beginPath(); ctx.moveTo(padL, py); ctx.lineTo(padL + w, py); ctx.stroke();
        }
        ctx.strokeStyle = "rgba(255,255,255,0.28)";
        ctx.beginPath(); ctx.rect(padL, padT, w, h); ctx.stroke();
        const py0 = yToPx(0, h, padT);
        ctx.strokeStyle = "rgba(255,255,255,0.35)";
        ctx.beginPath(); ctx.moveTo(padL, py0); ctx.lineTo(padL + w, py0); ctx.stroke();

        ctx.fillStyle = "rgba(229,231,235,0.9)";
        ctx.font = "12px Segoe UI, system-ui";
        ctx.textAlign = "center";
        for (let x = Math.ceil(view.xMin / 10) * 10; x <= view.xMax; x += 10) {
          const px = xToPx(x, w, padL);
          ctx.fillText(String(x), px, padT + h + 18);
        }
        ctx.textAlign = "right";
        for (let y = 0; y <= view.yMax; y += 1) {
          const py = yToPx(y, h, padT);
          ctx.fillText(String(y), padL - 8, py + 4);
        }
        ctx.textAlign = "center";
        ctx.fillStyle = "rgba(156,163,175,0.95)";
        ctx.fillText("Flexion (deg)", padL + w / 2, padT + h + 42);
        ctx.save();
        ctx.translate(16, padT + h / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.fillText("Moment arm (cm)  (flexion only; y<=0 hidden)", 0, 0);
        ctx.restore();
        ctx.restore();
      }

      function draw() {
        const rect = stage.getBoundingClientRect();
        const W = rect.width, H = rect.height;
        ctx.clearRect(0, 0, W, H);
        const padL = 70, padT = 20, padR = 20, padB = 60;
        const w = Math.max(10, W - padL - padR);
        const h = Math.max(10, H - padT - padB);

        drawAxes(padL, padT, w, h);
        screenSeries = [];
        for (const s of series) {
          if (!s.visible) continue;
          const pts = s.data.filter(p => p.y !== null).map(p => ({ px: xToPx(p.x, w, padL), py: yToPx(p.y, h, padT), x: p.x, y: p.y }));
          strokeSpline(pts, s.color, 4);
          screenSeries.push({ name: s.name, color: s.color, pts });
        }
        const sx = Math.round((80 / (view.xMax - view.xMin)) * 100);
        status.textContent = `${sx}% zoom`;
      }

      let dragging = false;
      let lastX = 0, lastY = 0;
      let dragAxis = null;
      stage.addEventListener("pointerdown", (e) => {
        dragging = true;
        dragAxis = null;
        stage.setPointerCapture(e.pointerId);
        lastX = e.clientX; lastY = e.clientY;
      });
      stage.addEventListener("pointermove", (e) => {
        if (!dragging) return;
        const dx = e.clientX - lastX;
        const dy = e.clientY - lastY;
        lastX = e.clientX; lastY = e.clientY;
        if (!dragAxis) {
          if (Math.abs(dx) < 2 && Math.abs(dy) < 2) return;
          dragAxis = Math.abs(dy) > Math.abs(dx) * 1.15 ? "y" : "x";
        }
        const rect = stage.getBoundingClientRect();
        const padL = 70, padT = 20, padR = 20, padB = 60;
        const w = Math.max(10, rect.width - padL - padR);
        const h = Math.max(10, rect.height - padT - padB);
        const xRange = view.xMax - view.xMin;
        const yRange = view.yMax - view.yMin;
        if (dragAxis !== "y") {
          view.xMin += -dx * xRange / w;
          view.xMax += -dx * xRange / w;
        }
        if (dragAxis !== "x") {
          view.yMin += dy * yRange / h;
          view.yMax += dy * yRange / h;
          if (view.yMin < 0) { view.yMax += -view.yMin; view.yMin = 0; }
        }
        draw();
      });
      stage.addEventListener("pointerup", () => { dragging = false; dragAxis = null; });
      stage.addEventListener("pointercancel", () => { dragging = false; dragAxis = null; });
      stage.addEventListener("pointerleave", hideTip);

      function handleHover(e) {
        if (dragging) { hideTip(); return; }
        const rect = stage.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const padL = 70, padT = 20, padR = 20, padB = 60;
        const w = Math.max(10, rect.width - padL - padR);
        const h = Math.max(10, rect.height - padT - padB);
        if (x < padL || x > padL + w || y < padT || y > padT + h) { hideTip(); return; }

        let best = null;
        for (const s of screenSeries) {
          const hit = closestOnPolyline(x, y, s.pts);
          if (!hit) continue;
          if (!best || hit.dist < best.dist) best = { s, ...hit };
        }
        if (!best || best.dist > 10) { hideTip(); return; }

        const deg = pxToX(best.cx, w, padL);
        const val = pxToY(best.cy, h, padT);
        showTip(`<div><strong>Region: ${best.s.name}</strong></div><div class="muted">${deg.toFixed(1)}Â° | ${val.toFixed(2)} cm</div>`, x, y);
      }
      stage.addEventListener("pointermove", handleHover);
      stage.addEventListener("mousemove", handleHover);

      stage.addEventListener("wheel", (e) => {
        e.preventDefault();
        const rect = stage.getBoundingClientRect();
        const padL = 70, padT = 20, padR = 20, padB = 60;
        const w = Math.max(10, rect.width - padL - padR);
        const h = Math.max(10, rect.height - padT - padB);
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const x0 = pxToX(mx, w, padL);
        const y0 = pxToY(my, h, padT);
        const zoom = e.deltaY > 0 ? 1.12 : 1 / 1.12;
        const xMin = x0 + (view.xMin - x0) * zoom;
        const xMax = x0 + (view.xMax - x0) * zoom;
        const yMin = y0 + (view.yMin - y0) * zoom;
        const yMax = y0 + (view.yMax - y0) * zoom;
        if ((xMax - xMin) < 5) return;
        if ((yMax - yMin) < 0.4) return;
        view = { xMin: Math.max(0, xMin), xMax: Math.min(80, xMax), yMin: Math.max(0, yMin), yMax };
        draw();
      }, { passive: false });

      resize();
      fit();
    </script>
  </body>
</html>
