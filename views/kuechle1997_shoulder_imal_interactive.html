<!doctype html>
<html lang="en">

      .overlay{position:absolute;right:12px;bottom:12px;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:14px;padding:8px 10px;color:var(--muted);font-size:12px;backdrop-filter:blur(8px)}

      const planeEl=document.getElementById("plane"),motionEl=document.getElementById("motion"),checksEl=document.getElementById("checks"),subtitleEl=document.getElementById("subtitle"),stage=document.getElementById("stage"),canvas=document.getElementById("c"),ctx=canvas.getContext("2d"),status=document.getElementById("status"),tip=document.getElementById("tip"),zoomInBtn=document.getElementById("zoomIn"),zoomOutBtn=document.getElementById("zoomOut");

      function extrapolatePoints(points,left=30,right=30,step=5){

          if(i===points.length-1) continue;

      function stroke(points,color,opts={}){if(points.length<2)return;ctx.save();ctx.strokeStyle=color;ctx.lineWidth=opts.width||4;ctx.globalAlpha=opts.alpha??1;ctx.lineJoin="round";ctx.lineCap="round";if(opts.glow){ctx.shadowColor=color;ctx.shadowBlur=16}ctx.beginPath();ctx.moveTo(points[0].px,points[0].py);for(let i=1;i<points.length-1;i++){const c=points[i],n=points[i+1];ctx.quadraticCurveTo(c.px,c.py,(c.px+n.px)/2,(c.py+n.py)/2)}ctx.lineTo(points[points.length-1].px,points[points.length-1].py);ctx.stroke();ctx.restore()}

      function hideTip(){tip.style.display="none"} function showTip(html,x,y){tip.innerHTML=html;tip.style.display="block";const r=stage.getBoundingClientRect(),tr=tip.getBoundingClientRect(),pad=14;tip.style.left=Math.max(pad,Math.min(r.width-tr.width-pad,x+pad))+"px";tip.style.top=Math.max(pad,Math.min(r.height-tr.height-pad,y+pad))+"px"}

      function yAtSeries(seriesObj,x){const pts=seriesObj.data;if(!pts.length||x<pts[0].x||x>pts[pts.length-1].x)return null;for(let i=0;i<pts.length-1;i++){const a=pts[i],b=pts[i+1];if(x<a.x||x>b.x)continue;if(b.x===a.x)return a.y;const t=(x-a.x)/(b.x-a.x);return a.y+(b.y-a.y)*t}return pts[pts.length-1].y}
      function computeBestRelativeAngle(){if(!activeSeries)return null;const active=series.find(s=>s.name===activeSeries&&s.visible);if(!active)return null;let best=null;const from=Math.ceil(view.xMin),to=Math.floor(view.xMax);for(let x=from;x<=to;x+=1){const activeY=yAtSeries(active,x);if(activeY===null)continue;let strongestOther=0;for(const s of series){if(!s.visible||s.name===active.name)continue;const y=yAtSeries(s,x);if(y===null)continue;strongestOther=Math.max(strongestOther,Math.abs(y))}const ratio=Math.abs(activeY)/Math.max(strongestOther,1e-6);if(!best||ratio>best.ratio)best={deg:x,ratio}}return best}
      function drawBestMarker(marker,padL,padT,w,h,color){if(!marker)return;const x=xToPx(marker.deg,w,padL);ctx.save();ctx.strokeStyle=color;ctx.globalAlpha=.8;ctx.setLineDash([6,6]);ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(x,padT);ctx.lineTo(x,padT+h);ctx.stroke();ctx.restore()}
      function plotBox(){const r=stage.getBoundingClientRect(),padL=70,padT=20,padR=20,padB=60;return{r,padL,padT,padR,padB,w:Math.max(10,r.width-padL-padR),h:Math.max(10,r.height-padT-padB)}}

      function drawAxes(padL,padT,w,h){const m=mode(),xStep=niceStep(view.xMax-view.xMin),yStep=niceStep(view.yMax-view.yMin);ctx.save();ctx.strokeStyle="rgba(255,255,255,.08)";ctx.lineWidth=1;for(let x=Math.ceil(view.xMin/xStep)*xStep;x<=view.xMax+1e-6;x+=xStep){const px=xToPx(x,w,padL);ctx.beginPath();ctx.moveTo(px,padT);ctx.lineTo(px,padT+h);ctx.stroke()}for(let y=Math.ceil(view.yMin/yStep)*yStep;y<=view.yMax+1e-6;y+=yStep){const py=yToPx(y,h,padT);ctx.beginPath();ctx.moveTo(padL,py);ctx.lineTo(padL+w,py);ctx.stroke()}ctx.strokeStyle="rgba(255,255,255,.28)";ctx.strokeRect(padL,padT,w,h);if(m.markers)for(const marker of m.markers){if(marker.x<view.xMin||marker.x>view.xMax)continue;const px=xToPx(marker.x,w,padL);ctx.save();ctx.strokeStyle="rgba(255,255,255,.3)";ctx.setLineDash([6,6]);ctx.beginPath();ctx.moveTo(px,padT);ctx.lineTo(px,padT+h);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle="rgba(229,231,235,.82)";ctx.font="12px Segoe UI, system-ui";ctx.textAlign="left";ctx.fillText(marker.label,px+6,padT+14);ctx.restore()}ctx.fillStyle="rgba(229,231,235,.92)";ctx.font="12px Segoe UI, system-ui";ctx.textAlign="center";for(let x=Math.ceil(view.xMin/xStep)*xStep;x<=view.xMax+1e-6;x+=xStep)ctx.fillText(String(Math.round(x*10)/10),xToPx(x,w,padL),padT+h+18);ctx.textAlign="right";for(let y=Math.ceil(view.yMin/yStep)*yStep;y<=view.yMax+1e-6;y+=yStep)ctx.fillText(String(Math.round(y*100)/100),padL-8,yToPx(y,h,padT)+4);ctx.textAlign="center";ctx.fillStyle="rgba(156,163,175,.95)";ctx.fillText(m.xLabel,padL+w/2,padT+h+42);ctx.save();ctx.translate(16,padT+h/2);ctx.rotate(-Math.PI/2);ctx.fillText(m.yLabel,0,0);ctx.restore();ctx.restore()}
      function draw(){const r=stage.getBoundingClientRect(),W=r.width,H=r.height,padL=70,padT=20,padR=20,padB=60,w=Math.max(10,W-padL-padR),h=Math.max(10,H-padT-padB);ctx.clearRect(0,0,W,H);drawAxes(padL,padT,w,h);if(activeSeries){const active=series.find(s=>s.name===activeSeries);if(active)drawBestMarker(computeBestRelativeAngle(),padL,padT,w,h,active.color)}const strokeDashed=(pts,color,isActive,lineAlpha)=>{if(pts.length<2)return;ctx.save();ctx.setLineDash([10,7]);ctx.strokeStyle=color;ctx.lineWidth=isActive?4:3;ctx.globalAlpha=.8*lineAlpha;ctx.lineJoin="round";ctx.lineCap="round";if(isActive){ctx.shadowColor=color;ctx.shadowBlur=14}ctx.beginPath();ctx.moveTo(pts[0].px,pts[0].py);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].px,pts[i].py);ctx.stroke();ctx.restore()};screen=[];for(const s of series){if(!s.visible)continue;const isActive=activeSeries===s.name,hasActive=!!activeSeries;const lineAlpha=hasActive?(isActive?1:.18):1;const leftPts=clipToXRange(s.left,view.xMin,view.xMax).map(p=>({x:p.x,y:p.y,px:xToPx(p.x,w,padL),py:yToPx(p.y,h,padT)}));const rightPts=clipToXRange(s.right,view.xMin,view.xMax).map(p=>({x:p.x,y:p.y,px:xToPx(p.x,w,padL),py:yToPx(p.y,h,padT)}));const reportedPts=clipToXRange(s.reported,view.xMin,view.xMax).map(p=>({x:p.x,y:p.y,px:xToPx(p.x,w,padL),py:yToPx(p.y,h,padT)}));strokeDashed(leftPts,s.color,isActive,lineAlpha);strokeDashed(rightPts,s.color,isActive,lineAlpha);if(reportedPts.length>1)stroke(reportedPts,s.color,{width:isActive?6:4,alpha:lineAlpha,glow:isActive});const fullVisible=clipToXRange(s.data,view.xMin,view.xMax).map(p=>({x:p.x,y:p.y,px:xToPx(p.x,w,padL),py:yToPx(p.y,h,padT)}));if(fullVisible.length>1)screen.push({name:s.name,pts:fullVisible})}const bounds=modeBounds();const zoomPct=Math.round((bounds.xMax-bounds.xMin)/(view.xMax-view.xMin)*100);status.textContent=`${DATA[key.plane].label} | ${mode().label} | ${zoomPct}% zoom`}
      planeEl.addEventListener("change",()=>{key.plane=planeEl.value;key.motion=Object.keys(DATA[key.plane].motions)[0];populateMotions();applyMode()}); motionEl.addEventListener("change",()=>{key.motion=motionEl.value;applyMode()});
      document.getElementById("fit").addEventListener("click",fitView); document.getElementById("reset").addEventListener("click",resetView); zoomInBtn.addEventListener("click",()=>{const r=stage.getBoundingClientRect();applyZoom(1/1.12,1/1.12,r.left+r.width/2,r.top+r.height/2)}); zoomOutBtn.addEventListener("click",()=>{const r=stage.getBoundingClientRect();applyZoom(1.12,1.12,r.left+r.width/2,r.top+r.height/2)}); document.getElementById("all").addEventListener("click",()=>{for(const s of series)s.visible=true;for(const cb of checksEl.querySelectorAll("input"))cb.checked=true;syncActiveRows();draw()}); document.getElementById("none").addEventListener("click",()=>{for(const s of series)s.visible=false;activeSeries=null;for(const cb of checksEl.querySelectorAll("input"))cb.checked=false;syncActiveRows();draw()}); window.addEventListener("resize",resize);
      stage.addEventListener("pointerdown",e=>{if(e.button!==0)return;dragging=true;stage.classList.add("is-dragging");lastX=e.clientX;lastY=e.clientY;stage.setPointerCapture(e.pointerId)});
